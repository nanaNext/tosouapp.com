<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ログイン</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/login.css">
    <script type="module" src="/static/js/pages/login.page.js"></script>
    <link rel="icon" href="data:,">
</head>

<body>
    <div class="hero"></div>
    <div class="wrapper">
        <div class="card">
            <div class="card-header">
                <img src="/static/images/izuk%20(1).png" alt="飯塚塗研" class="card-logo">
            </div>
            <div class="card-content">
                <div id="error" role="alert" aria-live="assertive"></div>
                <form id="loginForm" novalidate>
                    <div class="form-row">
                        <label for="email">
                            <svg class="label-icon" viewBox="0 0 24 24">
                                <path d="M4 4h16v16H4z" />
                                <path d="M4 6l8 6 8-6" />
                            </svg>
                            メールアドレス
                        </label>
                        <div class="input-with-icon">
                            <input id="email" type="email" placeholder="you@example.com" autocomplete="username" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <label for="password">
                            <svg class="label-icon" viewBox="0 0 24 24">
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                                <rect x="5" y="11" width="14" height="10" rx="2" />
                            </svg>
                            パスワード
                        </label>
                        <div class="input-with-icon">
                            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"
                                required>
                            <button type="button" id="togglePassword" class="icon-btn" aria-label="toggle"></button>
                        </div>
                    </div>
                    
                    <div class="notes">利用規約と個人情報の取り扱いについて同意の上ログインしてください。</div>
                    <div class="form-row actions">
                        <button type="submit" id="loginBtn" class="btn">ログイン</button>
                    </div>
                    <div id="success"></div>
                    <div id="status" aria-live="polite"></div>
                </form>
            </div>
            <div class="circle">
                <ul>
                    <li><a href="#">パスワードをお忘れの方はこちら</a></li>
                    <li><a href="#">利用規約</a></li>
                    <li><a href="#">個人情報の取り扱いについて</a></li>
                </ul>
            </div>
        </div>
    </div>
</body>

</html>
