<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chatbot</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/attendance.css">
</head>
<body>
  <main style="max-width:720px;margin:24px auto;">
    <h1>社内チャットボット</h1>
    <section>
      <label>カテゴリ: </label>
      <select id="cat"></select>
    </section>
    <section style="margin-top:16px;">
      <input id="search" placeholder="キーワード検索">
      <button id="searchBtn">検索</button>
    </section>
    <section style="margin-top:16px;">
      <ul id="faq-list"></ul>
    </section>
    <section style="margin-top:16px;">
      <div id="answer" style="white-space:pre-wrap;"></div>
    </section>
    <section style="margin-top:16px;">
      <input id="ask" placeholder="質問を入力してください。">
      <button id="askBtn">送信</button>
    </section>
  </main>
  <script type="module" src="/static/js/pages/chatbot.page.js"></script>
</body>
</html>
