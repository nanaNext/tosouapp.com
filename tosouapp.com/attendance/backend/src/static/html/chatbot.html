<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ヘルプチャットボット</title>
  <link rel="stylesheet" href="/static/css/base.css?v=navy-20260314">
  <link rel="stylesheet" href="/static/css/portal.css?v=navy-20260501-flickerfix1">
  <link rel="icon" href="data:,">
  <script src="/static/js/pages/session-idle.js?v=navy-20260403-1" defer></script>
  <script type="module" src="/static/js/pages/portal.page.js?v=navy-20260508-pjaxexp7"></script>
  <style>
    .chat-wrap { max-width: 980px; margin: 0 auto; padding: 20px; }
    .chat-card { background:#fff; border:1px solid #d7dbe3; border-radius:12px; padding:16px; }
    .chat-title { margin:0 0 12px; font-size:28px; color:#0f172a; font-weight:800; }
    .chat-row { margin-top:12px; }
    .chat-list { margin:0; padding-left:20px; }
    .chat-input { height:36px; border:1px solid #d1d5db; border-radius:8px; padding:0 10px; }
    .chat-btn { height:36px; border:1px solid #cbd5e1; border-radius:8px; padding:0 12px; background:#fff; cursor:pointer; }
  </style>
</head>
<body>
  <!--#include file="_partials/employee-header.html" -->
  <main class="content">
    <section class="chat-wrap">
      <div class="chat-card">
        <h1 class="chat-title">社内ヘルプチャットボット</h1>
        <section class="chat-row">
          <label>カテゴリ: </label>
          <select id="cat"></select>
        </section>
        <section class="chat-row">
          <input id="search" class="chat-input" placeholder="キーワード検索">
          <button id="searchBtn" class="chat-btn">検索</button>
        </section>
        <section class="chat-row">
          <ul id="faq-list" class="chat-list"></ul>
        </section>
        <section class="chat-row">
          <div id="answer" style="white-space:pre-wrap;"></div>
        </section>
        <section class="chat-row">
          <input id="ask" class="chat-input" placeholder="質問を入力してください">
          <button id="askBtn" class="chat-btn">質問</button>
        </section>
      </div>
    </section>
  </main>
  <script type="module" src="/static/js/pages/chatbot.page.js"></script>
</body>
</html>
