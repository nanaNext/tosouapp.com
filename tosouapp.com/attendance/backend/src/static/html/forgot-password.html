<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>パスワード再設定</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <script type="module" src="/static/js/pages/forgot-password.page.js"></script>
  <link rel="icon" href="data:,">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { width: 100%; max-width: 100%; overflow-x: clip; }
    body { margin: 0; background: #fff; }
    .page {
      width: min(560px, calc(100dvw - 16px));
      max-width: 100%;
      margin: 14px auto;
      padding: 16px 12px;
      background: #fff;
      border-radius: 10px;
    }
    .title { margin: 0 0 12px; font-size: 24px; }
    .field { margin-bottom: 12px; min-width: 0; }
    .field label { display: block; margin-bottom: 6px; font-weight: 600; }
    .field input {
      width: 100%;
      min-width: 0;
      padding: 10px;
      border: 1.5px solid #b8c7df;
      border-radius: 8px;
      background: #f8fbff;
      color: #0f172a;
      box-sizing: border-box;
      outline: none;
      font-size: 16px;
    }
    .field input::placeholder { color: #8aa0c4; opacity: 1; }
    .field input:focus {
      border-color: #4b84e8;
      box-shadow: 0 0 0 2px rgba(75, 132, 232, .18);
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    .btn { padding: 10px 16px; border: 0; border-radius: 8px; cursor: pointer; background: #1d4ed8; color: #fff; }
    .btn-secondary { background: #64748b; }
    .status { margin-top: 12px; color: #0f766e; }
    .error { margin-top: 12px; color: #b91c1c; }
    .actions .btn {
      display: inline-flex;
      flex: 1 1 180px;
      min-width: 0;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-sizing: border-box;
      text-align: center;
      min-height: 42px;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    @media (max-width: 480px) {
      .page {
        margin: 10px auto;
        width: min(560px, calc(100dvw - 12px));
        padding: 14px 10px;
        border-radius: 10px;
      }
      .title {
        font-size: 18px;
        margin-bottom: 8px;
      }
      .page p {
        margin: 0 0 10px;
        font-size: 14px;
        line-height: 1.45;
      }
      .field {
        margin-bottom: 10px;
      }
      .field label {
        margin-bottom: 4px;
        font-size: 14px;
      }
      .field input {
        min-height: 38px;
        padding: 8px 10px;
        font-size: 14px;
        border-width: 1.5px;
      }
      .actions {
        flex-wrap: nowrap;
        gap: 8px;
      }
      .actions .btn {
        width: auto;
        flex: 1 1 0;
        padding: 8px 10px;
        min-height: 38px;
        font-size: 12px;
        line-height: 1.15;
        white-space: normal;
        border-radius: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1 class="title">パスワードを忘れた方</h1>
    <p>登録済みメール・生年月日・社員番号を入力してください。確認後、再設定リンクをメール送信します。</p>
    <form id="forgotForm" novalidate>
      <div class="field">
        <label for="email">メールアドレス</label>
        <input id="email" type="email" placeholder="name@example.com" required>
      </div>
      <div class="field">
        <label for="birthDate">生年月日</label>
        <input id="birthDate" type="date" required>
      </div>
      <div class="field">
        <label for="employeeCode">社員番号</label>
        <input id="employeeCode" type="text" placeholder="EMP001" required>
      </div>
      <div class="actions">
        <button id="submitBtn" class="btn" type="submit">再設定メールを送信</button>
        <a class="btn btn-secondary" href="/ui/login">ログインへ戻る</a>
      </div>
      <div id="status" class="status" role="status" aria-live="polite"></div>
      <div id="error" class="error" role="alert" aria-live="assertive"></div>
    </form>
  </main>
</body>
</html>
