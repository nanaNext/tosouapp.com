<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>パスワード再設定</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <script type="module" src="/static/js/pages/forgot-password.page.js"></script>
  <link rel="icon" href="data:,">
  <style>
    .page { max-width: 560px; margin: 32px auto; padding: 24px; background: #fff; border-radius: 10px; }
    .title { margin: 0 0 12px; font-size: 24px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; margin-bottom: 6px; font-weight: 600; }
    .field input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; }
    .actions { display: flex; gap: 12px; margin-top: 16px; }
    .btn { padding: 10px 16px; border: 0; border-radius: 8px; cursor: pointer; background: #1d4ed8; color: #fff; }
    .btn-secondary { background: #64748b; }
    .status { margin-top: 12px; color: #0f766e; }
    .error { margin-top: 12px; color: #b91c1c; }
    .actions .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-sizing: border-box;
      text-align: center;
      min-height: 42px;
    }

    @media (max-width: 480px) {
      .page {
        margin: 12px auto;
        padding: 16px 12px;
        border-radius: 10px;
      }
      .title {
        font-size: 22px;
      }
      .field input {
        min-height: 40px;
        padding: 8px 10px;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .actions .btn {
        width: 100%;
        padding: 8px 10px;
        min-height: 38px;
        font-size: 13px;
        border-radius: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1 class="title">パスワードを忘れた方</h1>
    <p>登録済みメール・生年月日・社員番号を入力してください。確認後、再設定リンクをメール送信します。</p>
    <form id="forgotForm" novalidate>
      <div class="field">
        <label for="email">メールアドレス</label>
        <input id="email" type="email" required>
      </div>
      <div class="field">
        <label for="birthDate">生年月日</label>
        <input id="birthDate" type="date" required>
      </div>
      <div class="field">
        <label for="employeeCode">社員番号</label>
        <input id="employeeCode" type="text" required>
      </div>
      <div class="actions">
        <button id="submitBtn" class="btn" type="submit">再設定メールを送信</button>
        <a class="btn btn-secondary" href="/ui/login">ログインへ戻る</a>
      </div>
      <div id="status" class="status" role="status" aria-live="polite"></div>
      <div id="error" class="error" role="alert" aria-live="assertive"></div>
    </form>
  </main>
</body>
</html>
