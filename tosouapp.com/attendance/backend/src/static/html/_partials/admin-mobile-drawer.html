// Lớp nền mờ
<div id="drawerBackdrop" class="drawer-backdrop" hidden></div>
// Khung chứa menu
<div id="mobileDrawer" class="mobile-drawer" hidden>
// Phần đầu Menu (drawer-header)
  <div class="drawer-header">
    // Nút đóng menu
    <button id="mobileClose" class="mobile-close" aria-label="close">✕</button>
    <a href="/admin/dashboard" class="drawer-brand" aria-label="IIZUKA Home">
      <img src="/static/images/logo1.png" alt="logo" class="drawer-brand-icon">
      <span class="drawer-brand-text">IIZUKA</span>
    </a>
    <div class="drawer-header-actions" aria-hidden="true">
      <button type="button" class="drawer-head-btn">Sign In</button>
      <button type="button" class="drawer-head-btn dark">Get Started</button>
    </div>
  </div>
  // Phần thân menu
  <div class="drawer-body">
    <div class="drawer-search">
      <input type="search" placeholder="Search..." aria-label="Search">
    </div>
    // Phần menu 
    <div id="drawerNavMount"></div>
    // Phần static menu
    <div class="drawer-static">
      <a href="/admin/dashboard" class="drawer-item">ホーム</a>
      <a href="/ui/requests" class="drawer-item">申請</a>
      <a href="/ui/contact" class="drawer-item">お問い合わせ先</a>
    </div>
  </div>
</div>
