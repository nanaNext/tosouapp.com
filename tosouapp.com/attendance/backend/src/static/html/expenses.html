<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>交通費申請管理</title>
  <link rel="stylesheet" href="/static/css/base.css?v=20260416-1">
  <link rel="stylesheet" href="/static/css/portal.css?v=20260416-1">
  <link rel="icon" href="data:,">
  <script type="module" src="/static/js/pages/expenses.page.js?v=20260416-1"></script>
  <style>
    :root {
      --brand: #0b2c66;
      --primary: #2e7dff;
      --primary-hover: #1f66dc;
      --surface: #ffffff;
      --field: #f8fafc;
      --border: #e5e7eb;
      --ok: #16a34a;
      --warn: #f59e0b;
      --error: #ef4444;
    }

    html {
      background: #f7f9fb;
      overflow-y: scroll;
    }

    body:not(.admin) {
      overflow: visible !important;
    }

    .content {
      width: 100%;
      max-width: none;
      padding: 0 12px 12px 12px;
      box-sizing: border-box;
      background: #f7f9fb;
      height: auto;
      min-height: 0;
      overflow: visible;
      min-height: calc(100vh - var(--topbar-height) - var(--subbar-height));
    }

    body {
      background: #f7f9fb;
    }

    .subbar+.content {
      padding-top: calc(var(--topbar-height) + var(--subbar-height) + 4px);
    }

    body:not(.admin) .topbar-inner .search {
      max-width: 520px;
      flex: 0 1 520px;
    }

    .card {
      max-width: none;
      width: 100%;
      margin: 0;
      background: transparent;
      border-radius: 0;
      box-shadow: none;
      padding: 0;
      height: auto;
    }

    .form-wrap {
      max-width: 920px;
      width: 100%;
      margin-left: 0;
      margin-right: auto;
    }

    .form-wrap.adjust-grid {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px 20px 16px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
      margin-bottom: 20px;
    }

    .list-wrap {
      max-width: 920px;
      width: 100%;
      margin-left: 0;
      margin-right: auto;
    }

    .adjust-grid {
      display: grid;
      grid-template-columns: 80px minmax(0, 1fr) 80px minmax(0, 1fr);
      gap: 8px 8px;
      align-items: center;
    }

    .adjust-grid .full-row {
      grid-column: 1 / -1;
    }

    .adjust-label {
      color: #334155;
      font-weight: 500;
      font-family: Meiryo, "Meiryo UI", "Segoe UI", Arial, sans-serif;
      font-size: 12px;
      line-height: 1.4;
      margin-top: 0;
      padding-top: 0;
      padding-right: 4px;
      align-self: center;
      justify-self: start;
      text-align: left;
      white-space: nowrap;
    }

    .adjust-label-right {
      padding-left: 24px;
      padding-right: 4px;
    }

    .req {
      color: #dc2626;
      font-weight: 700;
      margin-left: 3px;
    }

    .section-head {
      font-size: 14px;
      font-weight: 700;
      color: #334155;
      background: transparent;
      border: none;
      border-left: 3px solid #93c5fd;
      border-radius: 0;
      padding: 2px 0 2px 8px;
      margin-bottom: 4px;
    }

    .month-picker-card {
      max-width: 920px;
      width: 100%;
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      margin-bottom: 10px;
    }

    .month-picker-title {
      font-size: 14px;
      font-weight: 700;
      color: #334155;
      margin-bottom: 8px;
    }

    .month-chip-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .month-chip {
      height: 34px;
      border: 1px solid #d7dee9;
      border-radius: 8px;
      background: #fff;
      color: #334155;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
    }

    .month-chip.active {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }

    .month-picker-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .month-picker-actions input[type="month"] {
      height: 34px;
      border: 1px solid #d7dee9;
      border-radius: 8px;
      padding: 0 8px;
      font-size: 13px;
    }

    .create-profile-box {

      margin-top: 10px;
      border: 1px solid #dbe2ea;
      background: #fff;
      padding: 10px;
      border-radius: 0;
    }

    .create-profile-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .create-profile-item {
      min-width: 0;
    }

    .create-profile-label {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 2px;
    }

    .create-profile-item input {
      width: 100%;
      height: 34px;
      border: 1px solid #d7dee9;
      border-radius: 0;
      padding: 0 8px;
      font-size: 13px;
      color: #0f172a;
      box-sizing: border-box;
      background: #fff;
    }

    .create-profile-status {
      margin-top: 8px;
      font-size: 12px;
      color: #334155;
    }

    .adjust-grid>div {
      min-width: 0;
    }

    .adjust-input,
    .adjust-grid input[type="text"],
    .adjust-grid input[type="number"],
    .adjust-grid input[type="date"],
    .adjust-grid input[type="month"],
    .adjust-grid textarea,
    .adjust-grid select {
      height: 36px;
      border-radius: 8px;
      border: 1px solid #d7dee9;
      background: #ffffff;
      padding: 4px 10px;
      box-sizing: border-box;
      width: 100%;
      max-width: 360px;
      font-family: Meiryo, "Meiryo UI", "Segoe UI", Arial, sans-serif;
      font-size: 13px;
    }

    .adjust-grid input:focus,
    .adjust-grid select:focus,
    .adjust-grid textarea:focus {
      outline: none;
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, .12);
    }

    .field-error {
      border-color: #d32f2f !important;
      box-shadow: 0 0 0 3px rgba(211, 47, 47, .10) !important;
      background: #fff9f9 !important;
    }

    .field-msg {
      margin-top: 4px;
      font-size: 11px;
      color: #d32f2f;
      display: flex;
      align-items: center;
      gap: 4px;
      line-height: 1.35;
    }

    .field-msg::before {
      content: "⚠";
      font-size: 11px;
    }

    .adjust-grid textarea {
      min-height: 96px;
      resize: vertical;
    }

    #exVia::placeholder {
      color: #64748b;
      opacity: 1;
      font-weight: 600;
    }

    .adjust-grid input[type="file"] {
      width: 100%;
      min-height: 32px;
      border: 1px solid #cfdced;
      border-radius: 8px;
      background: #fff;
      padding: 2px 6px;
      box-sizing: border-box;
      font-size: 11px;
      font-weight: 500;
      color: #475569;
      overflow: hidden;
    }

    .adjust-grid input[type="file"]::file-selector-button {
      border: 1px solid #bcd2f1;
      border-radius: 8px;
      background: #eff6ff;
      color: #0b2c66;
      padding: 2px 7px;
      margin-right: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .receipt-upload-row {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      gap: 12px !important;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: start;
    }

    .upload-card {
      flex: 1;
      min-width: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      padding: 0;
    }

    .receipt-upload-row>div {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      min-width: 0;
    }

    .image-upload-wrap {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
    }

    .upload-section-title {
      font-size: 13px;
      font-weight: 700;
      color: #334155;
      margin-bottom: 6px;
    }

    .upload-section-help {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 8px;
    }

    .upload-box {
      border: 1px solid #d8e3f3;
      border-radius: 10px;
      background: #ffffff;
      padding: 10px;
    }

    .upload-box input[type="file"] {
      border: none;
      background: transparent;
      padding: 0;
      min-height: 0;
    }

    .upload-box-head {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      color: #475569;
      font-weight: 700;
      font-size: 12px;
    }

    .upload-icon {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #e8f0fe;
      color: #1e40af;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      line-height: 1;
    }

    .upload-preview {
      margin-top: 8px;
      min-height: 24px;
      font-size: 12px;
      color: #475569;
    }

    .upload-thumb {
      width: 84px;
      height: 84px;
      object-fit: cover;
      border: 1px solid #dbe6f5;
      border-radius: 8px;
      background: #fff;
      display: inline-block;
    }

    .upload-file-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #dbe6f5;
      background: #fff;
      border-radius: 999px;
      padding: 4px 10px;
      max-width: 100%;
    }

    .upload-file-chip span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 360px;
      display: inline-block;
    }

    .upload-sections {
      border-top: 1px solid #e5e7eb;
      margin-top: 8px;
      padding-top: 12px;
      background: transparent;
      border-radius: 0;
      border: none;
      padding: 12px 0 0;
    }

    .checkbox-row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #334155;
      font-size: 13px;
    }

    .adjust-grid input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
    }

    .adjust-actions {
      display: flex;
      gap: 2px;
      align-items: center;
      margin-top: 0;
      padding-left: 2px;
      justify-content: flex-end;
      border-top: 1px solid #e5e7eb;
      padding-top: 8px;
    }

    .form-head-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e5e7eb;
      margin-bottom: 8px;
    }

    .form-head-left {
      min-width: 0;
    }

    .form-head-row .section-head {
      margin-bottom: 4px;
    }

    .form-head-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 2px;
      flex: 0 0 auto;
    }

    .adjust-actions .btn {
      height: 44px;
      border-radius: 10px;
      padding: 0 24px;
      font-family: Meiryo, "Meiryo UI", "Segoe UI", Arial, sans-serif;
      font-size: 14px;
      font-weight: 600;
    }

    #empSummary .btn,
    .adjust-actions .btn,
    #historySection .btn {
      border-radius: 10px !important;
    }
    #historySection .history-mode-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      line-height: 1;
      margin: 0;
      height: 28px;
      padding: 0;
      font-size: 12px !important;
      font-weight: 700 !important;
      border: none !important;
      background: transparent !important;
      color: #475569 !important;
      border-radius: 0 !important;
    }
    #historySection .history-mode-chip { cursor: default; }

    #historySection .action-icon-btn {
      width: 28px;
      height: 28px;
      padding: 0;
      color: #111827;
    }
    #historySection .action-icon-btn:hover:not([disabled]) {
      color: #7c3aed;
    }
    #historySection .action-icon-btn[data-action="delete-month"] {
      color: #111827;
    }
    #historySection .action-icon-btn[data-action="delete-month"]:hover:not([disabled]) {
      color: #111827;
    }
    #historySection .action-icon-btn[disabled] {
      opacity: 1;
      cursor: not-allowed;
    }

    #homeSection .form-head-actions .action-icon-btn {
      width: 52px;
      height: 52px;
      padding: 0;
      margin: 0;
      color: #111827;
    }
    #homeSection .form-head-actions .action-icon-btn:hover:not([disabled]) {
      color: #7c3aed;
    }
    #homeSection .form-head-actions .action-icon-btn svg {
      width: 26px;
      height: 26px;
    }

    .btn-primary {
      background: linear-gradient(180deg, var(--primary), var(--primary-hover));
      color: #fff;
      border: none;
      box-shadow: 0 6px 14px rgba(46, 125, 255, .28);
    }

    .btn-primary:hover {
      filter: brightness(1.05);
    }

    .expense-main :where(button, .btn, .icon-btn, .tab, .month-chip, .history-month-chip, a[href], [data-action], [role="button"]):not([disabled]) {
      transition: background-color .15s ease, color .15s ease, border-color .15s ease, box-shadow .15s ease, transform .06s ease;
      cursor: pointer;
    }
    .expense-main :where(button, .btn, .icon-btn, .tab, .month-chip, .history-month-chip, a[href], [data-action], [role="button"]):not(.action-icon-btn):not([disabled]):hover {
      border-color: #7c3aed !important;
      box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.20);
    }
    .expense-main :where(button, .btn, .icon-btn, .tab, .month-chip, .history-month-chip, a[href], [data-action], [role="button"]):not(.action-icon-btn):not([disabled]):active {
      transform: translateY(1px);
    }

    .action-icon-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: none !important;
      background: transparent !important;
      box-shadow: none !important;
      border-radius: 0 !important;
      padding: 0 2px;
      line-height: 1;
    }
    .action-icon-btn:hover:not([disabled]) {
      box-shadow: none !important;
      border-color: transparent !important;
    }
    .action-icon-btn:active {
      transform: none !important;
    }
    .action-icon-btn svg {
      display: block;
    }
    .action-icon-btn[data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-bottom: 8px;
      background: rgba(17, 24, 39, 0.92);
      color: #fff;
      font-size: 12px;
      padding: 6px 8px;
      border-radius: 4px;
      white-space: nowrap;
      z-index: 50;
      pointer-events: none;
    }
    .action-icon-btn[data-tooltip]:hover::before {
      content: "";
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-bottom: 2px;
      border: 6px solid transparent;
      border-top-color: rgba(17, 24, 39, 0.92);
      z-index: 51;
      pointer-events: none;
    }

    /*  cái này là button secondary dùng để hiển thị trạng thái của phiếu chi phí */
    .btn-secondary {
      background: #f3f4f6;
      color: #334155;
      border: 1px solid #d1d5db;
      box-shadow: none;
    }

    #exStatus {
      margin-right: auto;
      min-width: 160px;
      text-align: left;
      font-size: 12px;
      color: #475569;
    }

    .adj-table-card {
      margin-top: 14px;
    }

    .adj-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    .adj-table th,
    .adj-table td {
      padding: 10px 12px;
      font-family: Meiryo, "Meiryo UI", "Segoe UI", Arial, sans-serif;
      font-size: 14px;
      border: 1px solid #dbe2ea;
    }

    .adj-table thead th {
      background: #f6f8fc;
      color: var(--brand);
      font-weight: 800;
    }

    .adj-table tbody tr:hover {
      background: #f9fbff;
    }
    .adj-table tbody tr.total-row {
      background: #f8fafc;
    }
    .adj-table tbody tr.total-row td {
      border-top: 2px solid #cbd5e1;
    }

    #historySection .adj-table td {
      vertical-align: middle;
    }
    #historySection .adj-table th,
    #historySection .adj-table td {
      padding: 7px 8px;
      font-size: 12px;
      line-height: 1.3;
    }
    #historySection .status-pill {
      padding: 1px 6px;
      font-size: 11px;
    }
    #historySection .history-route-chip {
      padding: 1px 6px;
      font-size: 11px;
    }
    #historySection .history-month-pick {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    #historySection .history-month-pick input[type="checkbox"] {
      width: 14px;
      height: 14px;
      margin: 0;
      accent-color: #7c3aed;
    }
    #historySection .history-month-pick button.history-month-chip {
      margin: 0;
    }

    #historySection .adj-table th:nth-child(2),
    #historySection .adj-table td:nth-child(2) {
      width: 200px;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    #historySection .adj-table td:last-child .btn {
      height: 24px;
      border-radius: 999px !important;
      border: 1px solid #c9dafc;
      background: #eef4ff;
      color: #1e40af;
      font-size: 11px;
      font-weight: 700;
      padding: 0 8px;
      box-shadow: none;
      min-width: 0;
    }

    #historySection .adj-table td:last-child .btn:hover {
      background: #e0ecff;
      border-color: #b8cefb;
    }

    #historySection .adj-table td:last-child .icon-btn {
      width: 24px;
      height: 24px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    #historySection .adj-table td:last-child .icon-btn:hover {
      background: #fff5f5;
      border-color: #fecaca;
    }

    #historySection .adj-table td:last-child .icon-btn img {
      width: 13px;
      height: 13px;
      margin: 0;
    }

    /* Đây là CSS dùng để tạo một “pill badge” — kiểu nhãn bo tròn thường dùng cho:
trạng thái
tag
badge
status*/
    .status-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 12px;
    }

    .history-route-chip {
      display: inline-block;
      max-width: 100%;
      padding: 2px 8px;
      border: 1px solid #dbe2ea;
      border-radius: 8px;
      background: #f8fafc;
      color: #0f172a;
      font-size: 12px;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }

    .status-draft {
      background: #f3f4f6;
      color: #374151;
    }

    .status-applied {
      background: #dbeafe;
      color: #1e40af;
    }

    .status-approved {
      background: #dcfce7;
      color: #166534;
    }

    .status-rejected {
      background: #fee2e2;
      color: #7f1d1d;
    }

    .icon-btn {
      background: transparent;
      border: none;
      width: 36px;
      height: 36px;
      padding: 0;
      cursor: pointer;
    }

    .icon-btn img {
      width: 22px;
      height: 22px;
      display: block;
      margin: 0 auto;
    }

    .summary-cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .summary-card {
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      background: #fff;
      padding: 12px;
      text-align: left;
      cursor: pointer;
      transition: box-shadow .15s ease, border-color .15s ease, transform .1s ease;
    }

    .summary-card:hover {
      border-color: #c7d7ef;
      box-shadow: 0 6px 16px rgba(11, 44, 102, .08);
    }

    .summary-card:active {
      transform: translateY(1px);
    }

    .summary-card-title {
      color: #0b2c66;
      font-weight: 800;
      font-size: 16px;
      margin-bottom: 6px;
    }

    .summary-card-sub {
      color: #334155;
      font-size: 13px;
      line-height: 1.35;
      min-height: 34px;
    }

    .summary-card-meta {
      margin-top: 8px;
      color: #0f172a;
      font-size: 14px;
      font-weight: 700;
    }

    .history-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: end;
      margin-bottom: 10px;
    }
    .history-topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .history-top-actions {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    #historySection .history-head {
      padding: 6px 0 8px;
      margin-bottom: 10px;
      border-bottom: 1px solid #dbe2ea;
    }

    #historySection #historyModeLabel {
      margin: 0 0 6px !important;
      font-size: 18px;

        display: block;
      }

      #empSummary .adj-table tr {
        display: block;
        padding: 6px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        margin-bottom: 8px;
      }

      #empSummary .adj-table td {
        display: block;
        padding: 4px 6px;
        font-size: 13px;
        border: 0;
      }

      #empSummary .adj-table td:first-child {
        font-weight: 800;
        color: var(--brand);
      }

      #empSummary .adj-table td:last-child {
        text-align: left;
      }

      #empSummary .adj-table td>div[style*="display:flex"] {
        flex-direction: column !important;
        align-items: center !important;
        gap: 6px !important;
        width: 100%;
        margin: 0;
      }

      #empSummary .btn {
        display: block;
        width: var(--summary-control-width);
        height: 34px;
        font-size: 13px;
        white-space: normal;
        margin-left: auto;
        margin-right: auto;
        text-align: center !important;
      }

      #empSummary input[type="month"] {
        display: block;
        width: var(--summary-control-width);
        height: 34px;
        font-size: 13px;
        margin-left: auto;
        margin-right: auto;
      }

      #empSummary .adj-table td button,
      #empSummary .adj-table td input[type="month"] {
        max-width: 100%;
      }

      /* Keep month input + start button on one row in mobile summary */
      #empSummary .adj-table tbody tr:first-child td:last-child>div.new-month-row {
        flex-direction: row !important;
        align-items: center !important;
        width: var(--summary-control-width);
        margin-left: auto;
        margin-right: auto;
        gap: 8px !important;
        flex-wrap: nowrap !important;
      }

      #empSummary #empNewMonth {
        flex: 1 1 auto;
        width: calc(100% - 92px) !important;
        min-width: 0;
        margin: 0;
      }

      #empSummary #empNewStart {
        flex: 0 0 84px !important;
        width: 84px !important;
        min-width: 84px !important;
        margin: 0;
        white-space: nowrap !important;
      }

      /* Keep applied value + action button on one horizontal row */
      #empSummary .adj-table tbody tr:nth-child(2) {
        display: grid !important;
        grid-template-columns: 1fr auto !important;
        grid-template-areas:
          "title title"
          "value action";
        align-items: center;
        column-gap: 8px;
        row-gap: 6px;
      }

      #empSummary .adj-table tbody tr:nth-child(2) td:first-child {
        grid-area: title;
      }

      #empSummary .adj-table tbody tr:nth-child(2) td:nth-child(2) {
        grid-area: value;
        display: block;
        padding-right: 0;
      }

      #empSummary .adj-table tbody tr:nth-child(2) td:nth-child(3) {
        grid-area: action;
        display: block;
        text-align: right !important;
        padding-left: 0;
      }

      #empSummary .adj-table tbody tr:nth-child(2) #empGoForm {
        width: auto !important;
        min-width: 120px;
        margin: 0;
      }

      #historySection .history-toolbar {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }

      #empSummary .summary-cards {
        grid-template-columns: 1fr;
      }

      #empSummary .summary-card-title {
        font-size: 15px;
      }

      #historySection .history-filters {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      #historySection .history-filters label {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }

      #historySection .history-filters input,
      #historySection .history-filters select {
        flex: 1 1 auto;
        min-width: 0;
      }

      #historySection .history-actions {
        width: 100%;
        justify-content: space-between;
        gap: 8px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      #historySection .history-actions .btn {
        flex: 1 1 0;
        min-width: 0;
        height: 34px;
        font-size: 12px;
        padding: 0 8px;
        width: 100%;
      }

      #historySection .history-month-chip {
        height: 30px;
        font-size: 11px;
        padding: 0 10px;
        border-radius: 0;
      }

      #historySection .adj-table-card {
        border-radius: 10px;
      }

      #historySection .adj-table th,
      #historySection .adj-table td {
        padding: 8px 8px;
        font-size: 12px;
      }
    }

    #editModal {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      box-shadow: 0 24px 48px rgba(0, 0, 0, .16);
    }

    #editModal .adjust-input,
    #editModal input,
    #editModal select {
      background: #ffffff !important;
      border: 1px solid #cbd5e1 !important;
    }

    #editModal .adjust-label {
      color: #0b2c66;
      font-weight: 800;
    }

    .drawer-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(17, 24, 39, .45);
      z-index: 900;
    }
  </style>
</head>

<body>
  <div id="pageSpinner" class="page-spinner" hidden>
    <div class="lds-spinner" aria-hidden="true">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>
  <!--#include file="_partials/employee-header.html" -->
  <main class="content">
    <section class="card">
      <div id="error" class="adjust-error"></div>
      <div class="expense-layout">
        <aside class="expense-side-tabs">
          <div class="expense-inline-tabs">
            <button class="tab active" id="expNavNew" type="button">新規作成</button>
            <button class="tab" id="expNavApplied" type="button">申請</button>
            <button class="tab" id="expNavNotice" type="button">お知らせ</button>
          </div>
        </aside>
        <div class="expense-main">
          <section id="newMonthSection" style="display:none;">
            <div class="month-picker-card">
              <div class="month-picker-title">申請対象の年月を選択してください</div>
              <div id="exCreateMonthGrid" class="month-chip-grid"></div>
              <div class="month-picker-actions">
                <label for="exCreateMonthInput">対象年月:</label>
                <input id="exCreateMonthInput" type="month">
                <button id="exCreateMonthStart" class="btn btn-primary" type="button">入力して開始</button>
              </div>
            </div>
          </section>
          <section id="homeSection" style="display:none;">
            <div class="form-wrap adjust-grid">
              <div class="form-head-row full-row">
                <div class="form-head-left">
                  <div class="section-head">申請情報</div>
                  <div id="exStatus" class="adjust-status"></div>
                </div>
                <div class="form-head-actions">
                  <button id="exSubmit" class="action-icon-btn" type="button" data-tooltip="一時保存" aria-label="一時保存" title="一時保存">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                      <path d="M5 3h12l2 2v16H5V3z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                      <path d="M8 3v6h8V3" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                      <path d="M8 21v-8h8v8" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                    </svg>
                  </button>
                  <button id="exApply" class="action-icon-btn" type="button" data-tooltip="申請" aria-label="申請" title="申請">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                      <path d="M9 3h10v18H7V5a2 2 0 0 1 2-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                      <path d="M9 3v4h8V3" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                      <path d="M9 14l2 2 4-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </button>
                </div>
              </div>
              <div class="adjust-label">日付<span class="req">*</span></div>
              <div><input id="exDate" type="date"></div>
              <div class="adjust-label adjust-label-right">種別<span class="req">*</span></div>
              <div>
                <select id="exType" class="adjust-input">
                  <option value="train">電車</option>
                  <option value="bus">バス</option>
                  <option value="taxi">タクシー</option>
                  <option value="car">自家用車</option>
                  <option value="parking">駐車場代</option>
                  <option value="highway">高速料金</option>
                </select>
              </div>
              <div class="adjust-label">出発地<span class="req">*</span></div>
              <div><input id="exOrigin" type="text" class="adjust-input" placeholder="例）新宿駅"></div>
              <div class="adjust-label adjust-label-right">経由</div>
              <div><input id="exVia" type="text" class="adjust-input" placeholder="例）渋谷（任意）"></div>
              <div class="adjust-label">到着地<span class="req">*</span></div>
              <div><input id="exDestination" type="text" class="adjust-input" placeholder="例）東京駅"></div>
              <div class="adjust-label adjust-label-right">片道/往復<span class="req">*</span></div>
              <div>
                <select id="exTripType" class="adjust-input">
                  <option value="one_way" selected>片道</option>
                  <option value="round_trip">往復</option>
                  <option value="multi">複数</option>
                </select>
              </div>
              <div class="adjust-label">回数</div>
              <div><input id="exTripCount" type="number" min="1" step="1" class="adjust-input" value="1"></div>
              <div class="adjust-label">距離(km)</div>
              <div><input id="exKm" type="number" step="0.1" min="0" class="adjust-input"></div>
              <div class="adjust-label">単価(円/km)</div>
              <div><input id="exUnitPrice" type="number" step="1" min="0" class="adjust-input"></div>
              <div class="adjust-label">用途<span class="req">*</span></div>
              <div><input id="exPurpose" type="text" class="adjust-input" placeholder="例）客先訪問（A社）"></div>
              <div class="adjust-label adjust-label-right">金額<span class="req">*</span></div>
              <div><input id="exAmount" type="text" inputmode="numeric" class="adjust-input" placeholder="例）1,240">
              </div>
              <div class="adjust-label">定期</div>
              <div><label class="checkbox-row"><input id="exTeiki" type="checkbox"><span>定期区間を除外</span></label></div>
              <div class="upload-sections full-row">
                <div class="upload-section-title">添付ファイル（任意）</div>
                <div class="upload-section-help">必要な場合のみ、ICカード / 定期券の写真またはPDFを添付してください</div>
                <div class="receipt-upload-row">
                  <div class="upload-card">
                    <div class="upload-box">
                      <div class="upload-box-head"><span class="upload-icon">↑</span><span>表（Front）</span></div>
                      <input id="exReceiptFront" type="file" accept="application/pdf,image/*">
                      <div id="exReceiptFrontPreview" class="upload-preview"></div>
                    </div>
                  </div>
                  <div class="upload-card">
                    <div class="upload-box">
                      <div class="upload-box-head"><span class="upload-icon">↑</span><span>裏（Back）</span></div>
                      <input id="exReceiptBack" type="file" accept="application/pdf,image/*">
                      <div id="exReceiptBackPreview" class="upload-preview"></div>
                    </div>
                  </div>
                  <div class="upload-card">
                    <div class="upload-box">
                      <div class="upload-box-head"><span class="upload-icon">↑</span><span>領収書・参考画像（任意）</span></div>
                      <input id="exImages" type="file" accept="image/*" multiple>
                      <div id="exImagesPreview" class="upload-preview"></div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="adjust-label full-row">メモ</div>
              <div class="full-row"><textarea id="exMemo" class="adjust-input full" rows="3"
                  placeholder="任意：補足情報があれば入力してください"></textarea></div>
            </div>
          </section>
      <section id="historySection" style="display:none;">
            <div class="list-wrap">
              <div class="history-head">
                <div id="historyModeLabel" style="font-weight:800;color:#0b2c66;margin-bottom:8px;">交通費提出履歴（月次）</div>
                <div id="exMonthlyBoardHost"></div>
                <div id="exMonthlyProfileHost"></div>
              </div>
              <div class="history-toolbar">
                <div class="history-filters">
                  <label>対象年月: <input id="exFilterMonth" type="month"></label>
                  <label>ステータス:
                    <select id="exFilterStatus">
                      <option value="">すべて</option>
                      <option value="draft">未申請</option>
                      <option value="applied">申請中</option>
                      <option value="approved">承認済み</option>
                      <option value="rejected">差戻し</option>
                    </select>
                  </label>
                </div>
                <div class="history-actions">
                  <button id="exSearch" class="btn" type="button">検索</button>
                  <button id="exClear" class="btn" type="button">クリア</button>
                  <button id="exCsv" class="btn" type="button">CSV出力</button>
                  <button id="exShowHistory" class="btn" type="button">表示</button>
                </div>
              </div>
              <div id="exListHost"></div>
            </div>
          </section>
        </div>
      </div>
    </section>
  </main>
</body>

</html>
