<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>交通費計算</title>
  <link rel="stylesheet" href="/static/css/base.css?v=20260416-1">
  <link rel="stylesheet" href="/static/css/portal.css?v=20260416-1">
  <link rel="icon" href="data:,">
  <script type="module" src="/static/js/pages/expenses.page.js?v=20260416-1"></script>
  <style>
    :root {
      --brand: #0b2c66;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --surface: #ffffff;
      --field: #f3f4f6;
      --border: #d1d5db;
      --ok: #16a34a;
      --warn: #f59e0b;
      --error: #ef4444;
    }

    .content {
      width: 100%;
      max-width: none;
      padding: 72px 12px 12px 12px;
      box-sizing: border-box;
    }

    .card {
      max-width: none;
      width: 100%;
      margin: 0;
      background: var(--surface);
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .08);
      padding: 16px 20px;
    }

    .form-wrap {
      max-width: 980px;
      width: 100%;
      margin-left: auto;
      margin-right: auto;
    }

    .list-wrap {
      max-width: 980px;
      width: 100%;
      margin-left: auto;
      margin-right: auto;
    }

    .adjust-grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 10px 12px;
      align-items: center;
    }

    .adjust-label {
      color: var(--brand);
      font-weight: 700;
      font-family: Meiryo, "Meiryo UI", "Segoe UI", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.4;
      margin-top: 6px;
      padding-top: 6px;
    }

    .adjust-input,
    .adjust-grid input[type="text"],
    .adjust-grid input[type="number"],
    .adjust-grid input[type="date"],
    .adjust-grid input[type="month"],
    .adjust-grid textarea,
    .adjust-grid select {
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--field);
      padding: 6px 12px;
      box-sizing: border-box;
      width: 100%;
      font-family: Meiryo, "Meiryo UI", "Segoe UI", Arial, sans-serif;
      font-size: 14px;
    }

    .adjust-grid textarea {
      min-height: 96px;
      resize: vertical;
    }

    #exVia::placeholder {
      color: #64748b;
      opacity: 1;
      font-weight: 600;
    }

    .adjust-grid input[type="file"] {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 6px 8px;
      box-sizing: border-box;
      font-size: 12px;
      font-weight: 600;
      color: #334155;
      overflow: hidden;
    }

    .adjust-grid input[type="file"]::file-selector-button {
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #f8fafc;
      color: #0b2c66;
      padding: 5px 9px;
      margin-right: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .adjust-grid input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
    }

    .adjust-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }

    .adjust-actions .btn {
      height: 40px;
      border-radius: 10px;
      padding: 0 16px;
      font-family: Meiryo, "Meiryo UI", "Segoe UI", Arial, sans-serif;
      font-size: 14px;
    }

    #empSummary .btn,
    .adjust-actions .btn,
    #historySection .btn {
      border-radius: 10px !important;
    }

    .btn-primary {
      background: linear-gradient(180deg, var(--primary), var(--primary-hover));
      color: #fff;
      border: none;
    }

    .btn-primary:hover {
      filter: brightness(1.05);
    }

    .btn-secondary {
      background: #f3f6fb;
      color: var(--brand);
      border: 1px solid var(--border);
    }

    .adj-table-card {
      margin-top: 14px;
    }

    .adj-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    .adj-table th,
    .adj-table td {
      padding: 10px 12px;
      font-family: Meiryo, "Meiryo UI", "Segoe UI", Arial, sans-serif;
      font-size: 14px;
      border: 1px solid #dbe2ea;
    }

    .adj-table thead th {
      background: #f6f8fc;
      color: var(--brand);
      font-weight: 800;
    }

    .adj-table tbody tr:hover {
      background: #f9fbff;
    }

    .status-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 12px;
    }

    .status-draft {
      background: #f3f4f6;
      color: #374151;
    }

    .status-applied {
      background: #dbeafe;
      color: #1e40af;
    }

    .status-approved {
      background: #dcfce7;
      color: #166534;
    }

    .status-rejected {
      background: #fee2e2;
      color: #7f1d1d;
    }

    .icon-btn {
      background: transparent;
      border: none;
      width: 36px;
      height: 36px;
      padding: 0;
      cursor: pointer;
    }

    .icon-btn img {
      width: 22px;
      height: 22px;
      display: block;
      margin: 0 auto;
    }

    .summary-cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .summary-card {
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      background: #fff;
      padding: 12px;
      text-align: left;
      cursor: pointer;
      transition: box-shadow .15s ease, border-color .15s ease, transform .1s ease;
    }

    .summary-card:hover {
      border-color: #c7d7ef;
      box-shadow: 0 6px 16px rgba(11, 44, 102, .08);
    }

    .summary-card:active {
      transform: translateY(1px);
    }

    .summary-card-title {
      color: #0b2c66;
      font-weight: 800;
      font-size: 16px;
      margin-bottom: 6px;
    }

    .summary-card-sub {
      color: #334155;
      font-size: 13px;
      line-height: 1.35;
      min-height: 34px;
    }

    .summary-card-meta {
      margin-top: 8px;
      color: #0f172a;
      font-size: 14px;
      font-weight: 700;
    }

    .history-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: end;
      margin-bottom: 10px;
    }

    .history-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      flex: 1 1 auto;
      min-width: 0;
    }

    .history-filters label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #334155;
      font-weight: 700;
      font-size: 13px;
    }

    .history-filters input,
    .history-filters select {
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 10px;
      font-size: 13px;
      color: #0f172a;
      background: #fff;
    }

    .history-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-left: auto;
      flex-wrap: nowrap;
    }

    #historySection #exListHost {
      width: 100%;
      margin-top: 10px;
    }

    .topbar .page-title {
      color: #fff;
      font-weight: 800;
      font-family: Meiryo, "Meiryo UI", "Segoe UI", Arial, sans-serif;
      font-size: 16px;
      letter-spacing: .5px;
    }

    .topbar {
      min-height: 40px;
    }

    .topbar-inner {
      height: 56px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .page-title {
      font-size: 22px !important;
      margin: 0;
    }

    .page-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-tabs {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: nowrap;
    }

    .page-tabs .tab {
      height: 36px;
      padding: 0 8px;
      border-radius: 0;
      font-weight: 800;
      font-family: Meiryo, "Meiryo UI", "Segoe UI", Arial, sans-serif;
      font-size: 15px;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, .82);
      box-shadow: none;
      border-bottom: 2px solid transparent;
    }

    .page-tabs .tab.active {
      background: transparent;
      color: #fff;
      border-bottom-color: #fff;
    }

    @media (max-width: 768px) {
      .topbar-inner {
        height: auto;
        min-height: 56px;
        padding: 8px 12px;
        align-items: flex-start;
      }

      .page-left {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        min-width: 0;
      }

      .page-title {
        font-size: 18px !important;
        line-height: 1.2;
      }

      .page-tabs .tab {
        height: 32px;
        font-size: 14px;
      }

      .content {
        padding: 78px 8px 10px 8px;
      }

      .card {
        padding: 10px;
        border-radius: 10px;
      }

      .form-wrap,
      .list-wrap,
      #empSummary {
        max-width: 100%;
        margin-left: auto;
        margin-right: auto;
      }

      .adjust-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .adjust-label {
        line-height: 1.3;
        font-size: 12px;
        margin-top: 6px;
        margin-bottom: 2px;
      }

      .adjust-input,
      .adjust-grid input[type="text"],
      .adjust-grid input[type="number"],
      .adjust-grid input[type="date"],
      .adjust-grid input[type="month"],
      .adjust-grid textarea,
      .adjust-grid select {
        height: 34px;
        font-size: 12px;
      }

      .adjust-grid textarea {
        min-height: 72px;
      }

      .receipt-upload-row {
        flex-direction: row !important;
        align-items: flex-start !important;
        gap: 10px !important;
        flex-wrap: nowrap !important;
      }

      .receipt-upload-row>div {
        flex: 1 1 0;
        min-width: 0;
        width: auto;
      }

      .receipt-upload-row label {
        font-size: 12px !important;
        font-weight: 800 !important;
        color: #334155 !important;
        margin-bottom: 5px !important;
        line-height: 1.25;
      }

      .receipt-upload-row input[type="file"] {
        min-height: 36px;
        padding: 4px 6px;
        border-radius: 8px;
        font-size: 11px;
      }

      .receipt-upload-row input[type="file"]::file-selector-button {
        font-size: 11px;
        padding: 4px 7px;
      }



      #historySection .adj-table-card {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      #historySection .adj-table {
        min-width: 760px;
      }

      #historySection label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      #historySection .history-toolbar {
        align-items: stretch;
      }

      #historySection .history-filters {
        width: 100%;
      }

      #historySection .history-actions {
        margin-left: 0;
      }
    }

    @media (max-width: 480px) {
      html,
      body {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }

      body {
        margin: 0 auto !important;
      }

      body.drawer-open .topbar,
      body.drawer-open .content,
      body.drawer-open .subbar {
        transform: none !important;
      }

      .topbar {
        min-height: auto;
        left: 0;
        right: 0;
      }

      .topbar-inner {
        height: auto;
        padding: 4px 8px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 28px;
        grid-template-areas:
          "title user"
          "tabs user";
        column-gap: 6px;
        row-gap: 2px;
        align-items: center;
      }

      .page-left {
        display: contents;
      }

      .page-title {
        grid-area: title;
        font-size: 15px !important;
        line-height: 1.15;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .page-tabs {
        grid-area: tabs;
        gap: 8px;
        min-width: 0;
      }

      .page-tabs .tab {
        height: 24px;
        font-size: 12px;
        padding: 0 2px;
      }

      #mobileMenuBtn {
        display: none !important;
      }

      .topbar .user {
        grid-area: user;
        justify-self: end;
      }

      .topbar .user #userName,
      .topbar .user .caret {
        display: none;
      }

      .topbar .user .user-btn {
        width: 28px;
        height: 28px;
        border-radius: 7px;
        border: 1px solid rgba(255, 255, 255, .28);
        background: rgba(255, 255, 255, .1);
        box-shadow: none;
        padding: 0;
      }

      .topbar .user .user-icon {
        width: 18px;
        height: 18px;
      }

      .content {
        padding: 70px 6px 8px 6px;
        width: 100%;
        margin: 0 auto;
        display: flex;
        justify-content: center;
      }

      .content>section.card {
        width: min(100%, 420px);
        margin: 0 auto;
      }

      #empSummary,
      .form-wrap,
      .list-wrap,
      #homeSection,
      #historySection {
        width: 100%;
        max-width: 420px;
        margin-left: auto !important;
        margin-right: auto !important;
      }

      .adjust-actions {
        flex-wrap: nowrap;
        justify-content: flex-start;
        gap: 10px;
      }

      #homeSection .adjust-actions .btn {
        flex: 0 0 auto;
        width: auto;
        min-width: 132px;
        padding-left: 18px;
        padding-right: 18px;
      }

      #exApply {
        margin-left: auto !important;
        margin-right: 0 !important;
      }

      #homeSection #exStatus {
        display: none;
      }
    }

    #empSummary {
      max-width: 980px;
      width: 100%;
      margin-left: 0;
      margin-right: auto;
    }

    #empSummary .adj-table th,
    #empSummary .adj-table td {
      padding: 8px 10px;
    }

    #empSummary .btn {
      height: 32px;
    }

    #empSummary {
      background: var(--surface);
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .06);
    }

    #empSummary .adj-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    #empSummary .adj-table thead th {
      background: #f8fafc;
      color: var(--brand);
      font-weight: 800;
      border-bottom: 1px solid #e5e7eb;
    }

    #empSummary .adj-table tbody tr {
      border-bottom: 1px solid #eef2f7;
    }

    #empSummary .adj-table tbody tr:hover {
      background: transparent;
    }

    #empSummary .adj-table td:first-child {
      width: 160px;
      color: var(--brand);
      font-weight: 700;
    }

    #empSummary .adj-table td:last-child {
      text-align: right;
    }

    #empSummary input[type="month"] {
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
    }

    #empSummary .btn {
      border-radius: 10px;
      padding: 0 14px;
    }

    #empSummary #empNewStart {
      min-width: 96px;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    #empSummary .new-month-row {
      display: flex !important;
      flex-wrap: nowrap !important;
      align-items: center !important;
      gap: 8px !important;
      width: 100%;
    }

    #empSummary .new-month-row #empNewMonth {
      flex: 1 1 auto;
      min-width: 0;
    }

    #empSummary .new-month-row #empNewStart {
      flex: 0 0 auto;
    }

    #empSummary #empNewStart,
    #empSummary #empGoForm {
      background: linear-gradient(180deg, #2b6cb0 0%, #245a96 100%);
      color: #fff;
      border: 1px solid #1e4e8c;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .1);
      transition: background .15s ease, border-color .15s ease, box-shadow .15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    #empSummary #empNewStart:hover,
    #empSummary #empGoForm:hover {
      background: linear-gradient(180deg, #8b5cf6 0%, #7c3aed 100%) !important;
      color: #fff !important;
      border-color: #6d28d9 !important;
      box-shadow: 0 4px 10px rgba(91, 33, 182, .28) !important;
    }

    #empSummary #empNewStart:focus,
    #empSummary #empNewStart:focus-visible,
    #empSummary #empGoForm:focus,
    #empSummary #empGoForm:focus-visible,
    #empSummary #empNewStart:active,
    #empSummary #empGoForm:active {
      background: linear-gradient(180deg, #7c3aed 0%, #6d28d9 100%) !important;
      color: #fff !important;
      border-color: #5b21b6 !important;
      outline: none !important;
      box-shadow: 0 0 0 2px rgba(124, 58, 237, .3) !important;
    }

    @media (max-width: 640px) {
      #empSummary {
        --summary-control-width: min(100%, 300px);
      }

      #empSummary .adj-table {
        display: block;
      }

      #empSummary .adj-table thead {
        display: none;
      }

      #empSummary .adj-table tbody {
        display: block;
      }

      #empSummary .adj-table tr {
        display: block;
        padding: 6px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        margin-bottom: 8px;
      }

      #empSummary .adj-table td {
        display: block;
        padding: 4px 6px;
        font-size: 13px;
        border: 0;
      }

      #empSummary .adj-table td:first-child {
        font-weight: 800;
        color: var(--brand);
      }

      #empSummary .adj-table td:last-child {
        text-align: left;
      }

      #empSummary .adj-table td>div[style*="display:flex"] {
        flex-direction: column !important;
        align-items: center !important;
        gap: 6px !important;
        width: 100%;
        margin: 0;
      }

      #empSummary .btn {
        display: block;
        width: var(--summary-control-width);
        height: 34px;
        font-size: 13px;
        white-space: normal;
        margin-left: auto;
        margin-right: auto;
        text-align: center !important;
      }

      #empSummary input[type="month"] {
        display: block;
        width: var(--summary-control-width);
        height: 34px;
        font-size: 13px;
        margin-left: auto;
        margin-right: auto;
      }

      #empSummary .adj-table td button,
      #empSummary .adj-table td input[type="month"] {
        max-width: 100%;
      }

      /* Keep month input + start button on one row in mobile summary */
      #empSummary .adj-table tbody tr:first-child td:last-child > div.new-month-row {
        flex-direction: row !important;
        align-items: center !important;
        width: var(--summary-control-width);
        margin-left: auto;
        margin-right: auto;
        gap: 8px !important;
        flex-wrap: nowrap !important;
      }

      #empSummary #empNewMonth {
        flex: 1 1 auto;
        width: calc(100% - 92px) !important;
        min-width: 0;
        margin: 0;
      }

      #empSummary #empNewStart {
        flex: 0 0 84px !important;
        width: 84px !important;
        min-width: 84px !important;
        margin: 0;
        white-space: nowrap !important;
      }

      /* Keep "申請中" value + action button on one horizontal row */
      #empSummary .adj-table tbody tr:nth-child(2) {
        display: grid !important;
        grid-template-columns: 1fr auto !important;
        grid-template-areas:
          "title title"
          "value action";
        align-items: center;
        column-gap: 8px;
        row-gap: 6px;
      }

      #empSummary .adj-table tbody tr:nth-child(2) td:first-child {
        grid-area: title;
      }

      #empSummary .adj-table tbody tr:nth-child(2) td:nth-child(2) {
        grid-area: value;
        display: block;
        padding-right: 0;
      }

      #empSummary .adj-table tbody tr:nth-child(2) td:nth-child(3) {
        grid-area: action;
        display: block;
        text-align: right !important;
        padding-left: 0;
      }

      #empSummary .adj-table tbody tr:nth-child(2) #empGoForm {
        width: auto !important;
        min-width: 120px;
        margin: 0;
      }

      #historySection .history-toolbar {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }

      #empSummary .summary-cards {
        grid-template-columns: 1fr;
      }

      #empSummary .summary-card-title {
        font-size: 15px;
      }

      #historySection .history-filters {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      #historySection .history-filters label {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }

      #historySection .history-filters input,
      #historySection .history-filters select {
        flex: 1 1 auto;
        min-width: 0;
      }

      #historySection .history-actions {
        width: 100%;
        justify-content: space-between;
        gap: 8px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      #historySection .history-actions .btn {
        flex: 1 1 0;
        min-width: 0;
        height: 34px;
        font-size: 12px;
        padding: 0 8px;
        width: 100%;
      }

      #historySection .adj-table-card {
        border-radius: 10px;
      }

      #historySection .adj-table th,
      #historySection .adj-table td {
        padding: 8px 8px;
        font-size: 12px;
      }
    }

    #editModal {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      box-shadow: 0 24px 48px rgba(0, 0, 0, .16);
    }

    #editModal .adjust-input,
    #editModal input,
    #editModal select {
      background: #ffffff !important;
      border: 1px solid #cbd5e1 !important;
    }

    #editModal .adjust-label {
      color: #0b2c66;
      font-weight: 800;
    }

    .drawer-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(17, 24, 39, .45);
      z-index: 900;
    }
  </style>
</head>

<body>
  <div id="pageSpinner" class="page-spinner" hidden>
    <div class="lds-spinner" aria-hidden="true">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="page-left">
        <div class="page-title">交通費計算</div>
        <div class="page-tabs" style="display:flex;gap:8px;align-items:center;">
          <button class="tab active" id="topNavNew" type="button">新規作成</button>
          <button class="tab" id="topNavApplied" type="button">申請</button>
          <button class="tab" id="topNavNotice" type="button">お知らせ</button>
        </div>
      </div>
      <div class="user">
        <div class="user-menu">
          <button class="user-btn" aria-haspopup="true" aria-expanded="false">
            <img src="/static/images/use.png" alt="" class="user-icon">
            <span id="userName"></span>
            <span class="caret">▾</span>
          </button>
          <div class="dropdown" id="userDropdown" hidden>
            <button class="item" id="btnLogout" type="button">ログアウト</button>
          </div>
        </div>
      </div>
    </div>
  </header>
  <div id="drawerBackdrop" class="drawer-backdrop" hidden></div>
  <!-- removed global navigation for expenses-only flow -->
  <main class="content">
    <section class="card">
      <div id="error" class="adjust-error"></div>
      <section id="homeSection" style="display:none;">
        <div class="form-wrap adjust-grid">
          <div class="adjust-label">日付</div>
          <div><input id="exDate" type="date"></div>
          <div class="adjust-label">費目</div>
          <div>
            <select id="exType" class="adjust-input">
              <option value="train">電車</option>
              <option value="bus">バス</option>
              <option value="taxi">タクシー</option>
              <option value="car">自家用車</option>
              <option value="parking">駐車場代</option>
              <option value="highway">高速代</option>
            </select>
          </div>
          <div class="adjust-label">出発</div>
          <div><input id="exOrigin" type="text" class="adjust-input"></div>
          <div class="adjust-label">経由</div>
          <div><input id="exVia" type="text" class="adjust-input" placeholder="任意"></div>
          <div class="adjust-label">到着</div>
          <div><input id="exDestination" type="text" class="adjust-input"></div>
          <div class="adjust-label">片道/往復</div>
          <div>
            <select id="exTripType" class="adjust-input">
              <option value="one_way" selected>片道</option>
              <option value="round_trip">往復</option>
              <option value="multi">回数</option>
            </select>
          </div>
          <div class="adjust-label">回数</div>
          <div><input id="exTripCount" type="number" min="1" step="1" class="adjust-input" value="1"></div>
          <div class="adjust-label">距離(km)</div>
          <div><input id="exKm" type="number" step="0.1" min="0" class="adjust-input"></div>
          <div class="adjust-label">単価(円/km)</div>
          <div><input id="exUnitPrice" type="number" step="1" min="0" class="adjust-input"></div>
          <div class="adjust-label">目的</div>
          <div><input id="exPurpose" type="text" class="adjust-input"></div>
          <div class="adjust-label">金額</div>
          <div><input id="exAmount" type="number" step="1" min="0" class="adjust-input"></div>
          <div class="adjust-label">定期</div>
          <div><label><input id="exTeiki" type="checkbox"> 定期区間内</label></div>
          <div class="adjust-label">領収書（PDF）</div>
          <div class="receipt-upload-row" style="display:flex;gap:8px;align-items:center;">
            <div style="flex:1;">
              <label style="display:block;color:#6b7280;font-weight:700;margin-bottom:4px;">表（Front）</label>
              <input id="exReceiptFront" type="file" accept="application/pdf,image/*">
            </div>
            <div style="flex:1;">
              <label style="display:block;color:#6b7280;font-weight:700;margin-bottom:4px;">裏（Back）</label>
              <input id="exReceiptBack" type="file" accept="application/pdf,image/*">
            </div>
          </div>
          <div class="adjust-label">画像（任意）</div>
          <div><input id="exImages" type="file" accept="image/*" multiple></div>
          <div class="adjust-label">メモ</div>
          <div><textarea id="exMemo" class="adjust-input full" rows="4"></textarea></div>
        </div>
        <div class="adjust-actions">
          <button id="exSubmit" class="btn btn-secondary" type="button">下書き保存</button>
          <button id="exApply" class="btn btn-primary" type="button" style="margin-left:8px;">申請</button>
          <div id="exStatus" class="adjust-status"></div>
      </section>
      </div>
      <div class="adjust-spacer"></div>
      <div class="adjust-spacer"></div>
      <section id="historySection" style="margin:8px 0; display:none;">
        <div class="list-wrap">
          <div class="history-toolbar">
            <div class="history-filters">
              <label>対象月: <input id="exFilterMonth" type="month"></label>
              <label>ステータス:
                <select id="exFilterStatus">
                  <option value="">すべて</option>
                  <option value="draft">未申請</option>
                  <option value="applied">申請中</option>
                  <option value="approved">承認済み</option>
                  <option value="rejected">差戻し</option>
                </select>
              </label>
            </div>
            <div class="history-actions">
              <button id="exSearch" class="btn" type="button">検索</button>
              <button id="exClear" class="btn" type="button">クリア</button>
              <button id="exCsv" class="btn" type="button">CSV出力</button>
              <button id="exShowHistory" class="btn" type="button">表示</button>
            </div>
          </div>
          <div id="exListHost"></div>
        </div>
      </section>
</body>

</html>
