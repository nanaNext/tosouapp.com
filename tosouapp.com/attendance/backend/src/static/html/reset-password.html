<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>新しいパスワード設定</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <script type="module" src="/static/js/pages/reset-password.page.js"></script>
  <link rel="icon" href="data:,">
  <style>
    .page { max-width: 560px; margin: 32px auto; padding: 24px; background: #fff; border-radius: 10px; }
    .title { margin: 0 0 12px; font-size: 24px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; margin-bottom: 6px; font-weight: 600; }
    .field input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; }
    .actions { display: flex; gap: 12px; margin-top: 16px; }
    .btn { padding: 10px 16px; border: 0; border-radius: 8px; cursor: pointer; background: #1d4ed8; color: #fff; }
    .btn-secondary { background: #64748b; }
    .status { margin-top: 12px; color: #0f766e; }
    .error { margin-top: 12px; color: #b91c1c; }
  </style>
</head>
<body>
  <main class="page">
    <h1 class="title">新しいパスワードを設定</h1>
    <p>8文字以上、大文字・小文字・数字を含むパスワードを設定してください。</p>
    <form id="resetForm" novalidate>
      <div class="field">
        <label for="newPassword">新しいパスワード</label>
        <input id="newPassword" type="password" minlength="8" required>
      </div>
      <div class="field">
        <label for="confirmPassword">新しいパスワード（確認）</label>
        <input id="confirmPassword" type="password" minlength="8" required>
      </div>
      <div class="actions">
        <button id="submitBtn" class="btn" type="submit">パスワードを更新</button>
        <a class="btn btn-secondary" href="/ui/login">ログインへ戻る</a>
      </div>
      <div id="status" class="status" role="status" aria-live="polite"></div>
      <div id="error" class="error" role="alert" aria-live="assertive"></div>
    </form>
  </main>
</body>
</html>
