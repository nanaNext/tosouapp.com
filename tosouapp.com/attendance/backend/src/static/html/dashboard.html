<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ダッシュボード</title>
  <link rel="stylesheet" href="/static/css/base.css?v=navy-20260314">
  <link rel="stylesheet" href="/static/css/portal.css?v=navy-20260411-searchhint">
  <script src="/static/js/pages/session-idle.js?v=navy-20260324-1" defer></script>
  <script type="module" src="/static/js/pages/dashboard.page.js"></script>
  <link rel="icon" href="data:,">
</head>
<body>
  <div id="pageSpinner" class="page-spinner">
    <div class="lds-spinner" aria-hidden="true">
      <div></div><div></div><div></div><div></div><div></div><div></div>
      <div></div><div></div><div></div><div></div><div></div><div></div>
    </div>
  </div>
  <header class="topbar">
    <button id="mobileMenuBtn" class="mobile-btn" aria-label="menu" aria-expanded="false" aria-controls="mobileDrawer">☰</button>
    <div class="topbar-inner">
      <div class="brand">
        <img src="/static/images/logo1.png" alt="logo" class="icon">
        <span class="logo">IIZUKA</span>
      </div>
      <div class="search">
        <input type="search" placeholder="Search..." aria-label="Search">
        <span class="search-hint" aria-hidden="true">^ K</span>
        <div class="search-meta" aria-hidden="true">
          <button class="search-close" title="Close" type="button">×</button>
          <span class="search-esc">ESC</span>
        </div>
      </div>
      <div class="user">
        <div class="user-menu">
          <button class="user-btn" aria-haspopup="true" aria-expanded="false">
            <img src="/static/images/use.png" alt="user" class="user-icon">
            <span id="userName"></span>
            <span class="caret">▾</span>
          </button>
          <div class="dropdown" id="userDropdown" hidden>
            <a href="/ui/portal" class="item">ホーム</a>
            <a href="/ui/dashboard" class="item">現在の登録情報</a>
            <a href="/ui/admin?tab=settings" class="item">各種設定</a>
            <button class="item" id="btnLogout" type="button">ログアウト</button>
          </div>
        </div>
      </div>
    </div>
  </header>
  <div id="drawerBackdrop" class="drawer-backdrop" hidden></div>
  <div id="mobileDrawer" class="mobile-drawer" hidden>
    <div class="drawer-header">
      <button id="mobileClose" class="mobile-close" aria-label="close">✕</button>
    </div>
    <a href="/ui/portal" class="drawer-item">ホーム</a>
    <a href="/ui/requests" class="drawer-item">申請</a>
    <a href="/ui/contact" class="drawer-item">お問い合わせ先</a>
  </div>
  <div class="subbar">
    <nav class="subnav">
      <a href="/ui/portal">ホーム</a>
      <a href="/ui/requests">申請</a>
      <a href="/ui/contact">お問い合わせ先</a>
    </nav>
  </div>
  <main class="content">
    <div id="error" style="display:none;color:#b00020;font-weight:600;"></div>
    <section class="tiles" id="tiles"></section>
  </main>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      try {
        var box = document.querySelector('.topbar-inner .search');
        if (!box || box.dataset.bound === '1') return;
        box.dataset.bound = '1';
        var input = box.querySelector('input[type="search"]');
        var closeBtn = box.querySelector('.search-close');
        var hint = box.querySelector('.search-hint');
        var open = function () { box.classList.add('active'); try { input && input.focus(); input && input.select(); } catch {} };
        var close = function () { box.classList.remove('active'); try { input && input.blur(); } catch {} };
        if (input) input.addEventListener('focus', open);
        if (hint) hint.addEventListener('click', function (e) { e.preventDefault(); open(); });
        if (closeBtn) closeBtn.addEventListener('click', function (e) { e.preventDefault(); close(); });
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape') { close(); return; }
          var isCtrlK = (e.key === 'k' || e.key === 'K') && (e.ctrlKey || e.metaKey);
          var isPlainK = (e.key === 'k' || e.key === 'K') && !e.ctrlKey && !e.metaKey && !e.altKey && !e.shiftKey;
          if (isCtrlK || isPlainK) {
            var t = e.target;
            var tag = (t && t.tagName) ? t.tagName.toLowerCase() : '';
            var editable = (t && (t.isContentEditable || tag === 'input' || tag === 'textarea' || tag === 'select'));
            if (editable && !isCtrlK) return;
            e.preventDefault();
            open();
          }
        });
        document.addEventListener('click', function (e) {
          if (!box.classList.contains('active')) return;
          var t = e && e.target;
          if (t && t.closest && t.closest('.topbar-inner .search')) return;
          close();
        });
      } catch {}
    });
  </script>
</body>
</html>
