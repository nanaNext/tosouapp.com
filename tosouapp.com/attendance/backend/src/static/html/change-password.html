<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=0.75,minimum-scale=0.75,maximum-scale=3,user-scalable=yes">
  <title>パスワード変更</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/attendance.css?v=navy-20260408-1">
  <link rel="stylesheet" href="/static/css/attendance-monthly.css?v=navy-20260408-1">
  <style>
    .kintai-main { background: #f5f6f8; padding: 12px; }
    .pw-container { max-width: 900px; margin: 0 auto; }
    .pw-title { font-weight: 900; font-size: 22px; color: #1e64b7; margin: 8px 0 12px; }
    .pw-form { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; box-shadow: 0 10px 20px rgba(2,6,23,.06); }
    .pw-row { display: grid; grid-template-columns: 220px 1fr; gap: 10px; align-items: center; margin-bottom: 12px; }
    .pw-label { font-weight: 900; color: #0f172a; }
    .pw-input { height: 40px; border: 1px solid #cbd5e1; border-radius: 6px; padding: 0 10px; font-size: 16px; background: #fff; color: #0f172a; }
    .pw-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 12px; }
    .pw-btn { border: 1px solid #0b2c66; background: #0b2c66; color: #fff; font-weight: 900; border-radius: 999px; height: 34px; padding: 0 16px; cursor: pointer; }
    .pw-note { font-size: 12px; color: #334155; margin-top: 8px; white-space: pre-line; }
    .pw-error { color: #b00020; font-weight: 700; margin-bottom: 8px; display:none; }
    .pw-ok { color: #166534; font-weight: 800; margin-bottom: 8px; display:none; }
    @media (max-width: 900px) {
      .pw-row { grid-template-columns: 1fr; }
      .pw-label { font-size: 12px; }
      .pw-title { font-size: 18px; }
    }
  </style>
</head>
<body class="nav-js">
  <header class="kintai-top">
    <div class="kintai-top-inner">
      <div class="kintai-brand">
        <div class="kintai-logo">スマートE勤怠</div>
      </div>
      <nav class="kintai-nav" aria-label="main">
        <div class="kintai-nav-dd">
          <button class="kintai-nav-btn" type="button" data-dd="att" aria-haspopup="true" aria-expanded="false">
            勤怠入力 <span class="kintai-caret">▾</span>
          </button>
          <div class="kintai-dd" data-dd-panel="att" hidden>
            <a href="/ui/attendance">個人カレンダー登録画面</a>
            <a href="/ui/attendance/monthly">月次勤怠入力へ</a>
            <a href="/ui/attendance/simple">簡易登録画面</a>
          </div>
        </div>
        <div class="kintai-nav-dd">
          <button class="kintai-nav-btn" type="button" data-dd="leave" aria-haspopup="true" aria-expanded="false">
            有休管理 <span class="kintai-caret">▾</span>
          </button>
          <div class="kintai-dd" data-dd-panel="leave" hidden>
            <a href="/ui/leave-ledger">休暇欠勤台帳</a>
          </div>
        </div>
        <div class="kintai-nav-dd">
          <button class="kintai-nav-btn active" type="button" data-dd="common" aria-haspopup="true" aria-expanded="false">
            共通機能 <span class="kintai-caret">▾</span>
          </button>
          <div class="kintai-dd" data-dd-panel="common" hidden>
            <a href="/ui/change-password">パスワード変更画面</a>
          </div>
        </div>
      </nav>
      <div class="kintai-user">
        <div class="kintai-top-links">
          <a class="kintai-top-link" href="/ui/manual">操作マニュアル</a>
          <a class="kintai-top-link" href="/ui/faq">よくある質問</a>
          <a class="kintai-top-link logout-link" href="/ui/logout">ログアウト</a>
        </div>
      </div>
    </div>
  </header>
  <main class="kintai-main">
    <div class="pw-container">
      <div class="pw-title">パスワード変更</div>
      <div id="pwError" class="pw-error"></div>
      <div id="pwOk" class="pw-ok"></div>
      <form id="pwForm" class="pw-form" autocomplete="off">
        <div class="pw-row">
          <label class="pw-label" for="currentPwd">現在のパスワード</label>
          <input id="currentPwd" class="pw-input" type="password" required>
        </div>
        <div class="pw-row">
          <label class="pw-label" for="newPwd">新しいパスワード</label>
          <input id="newPwd" class="pw-input" type="password" required>
        </div>
        <div class="pw-row">
          <label class="pw-label" for="confirmPwd">新しいパスワード(再入力)</label>
          <input id="confirmPwd" class="pw-input" type="password" required>
        </div>
        <div class="pw-actions">
          <button type="submit" class="pw-btn">登録</button>
        </div>
        <div class="pw-note">
※ 半角のアルファベット、数字、記号を組み合わせた10桁以上のパスワードを入力してください。（アルファベットのみ、数字のみ、または記号のみのパスワードは設定できません。）
※ 使用可能な半角記号は「#*$%&()¥*+-,.:;=< >?@[]^_`{}~」です。
※ パスワード初期化申請を行った場合は、「現在のパスワード」にメール記載の仮パスワードを入力してください。
        </div>
      </form>
    </div>
  </main>
  <script src="/static/js/pages/session-idle.js" defer></script>
  <script src="/static/js/pages/kintai-topbar-links.js?v=navy-20260417-3" defer></script>
  <script type="module" src="/static/js/pages/change-password.page.js"></script>
</body>
</html>
