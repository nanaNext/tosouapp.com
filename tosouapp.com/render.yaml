services:
  # === PRODUCTION ===
  - type: web
    name: iizuka-attendance
    env: node
    plan: starter
    region: singapore
    buildCommand: |
      npm install
      npx esbuild --version || true
      npm run build:minify || true
    startCommand: |
      npm start
    healthCheckPath: /ping
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: TRUST_PROXY_HOPS
        value: "2"
      - key: ENFORCE_CSRF
        value: "true"
      - key: ENABLE_HSTS
        value: "true"
      - key: COMPANY_NAME
        value: Iizuka Token
      - key: ACCESS_TOKEN_EXPIRES
        value: "900"
      - key: IDLE_TIMEOUT_SECONDS
        value: "1500"
      - key: REFRESH_TOKEN_EXPIRES_DAYS
        value: "7"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: JWT_SECRET_CURRENT
        sync: false
      - key: JWT_SECRET_PREVIOUS
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: SUPER_ADMIN_NAME
        value: Super Admin
    disk:
      name: uploads
      mountPath: /opt/render/project/src/attendance/backend/src/uploads
      sizeGB: 1

  # === STAGING ===
  - type: web
    name: iizuka-attendance-staging
    env: node
    plan: free
    region: singapore
    branch: staging
    buildCommand: |
      npm install --omit=dev
    startCommand: |
      npm start
    healthCheckPath: /ping
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: staging
      - key: TRUST_PROXY_HOPS
        value: "2"
      - key: ENFORCE_CSRF
        value: "false"
      - key: ENABLE_HSTS
        value: "false"
      - key: DISABLE_SCHEDULERS
        value: "true"
      - key: COMPANY_NAME
        value: "[STAGING] Iizuka Token"
      - key: ACCESS_TOKEN_EXPIRES
        value: "3600"
      - key: IDLE_TIMEOUT_SECONDS
        value: "7200"
      - key: REFRESH_TOKEN_EXPIRES_DAYS
        value: "30"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: JWT_SECRET_CURRENT
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: SUPER_ADMIN_NAME
        value: Super Admin

  # === BACKGROUND WORKER (BullMQ) ===
  # Uncomment below when you need email queue processing on production.
  # Requires a Redis instance (see below).
  #
  # - type: worker
  #   name: iizuka-attendance-worker
  #   env: node
  #   plan: starter
  #   region: singapore
  #   buildCommand: npm install
  #   startCommand: npm run workers:start
  #   autoDeploy: true
  #   envVars:
  #     - key: NODE_ENV
  #       value: production
  #     - key: REDIS_URL
  #       fromService:
  #         name: iizuka-redis
  #         type: redis
  #         property: connectionString
  #     - key: DB_HOST
  #       sync: false
  #     - key: DB_PORT
  #       value: "3306"
  #     - key: DB_NAME
  #       sync: false
  #     - key: DB_USER
  #       sync: false
  #     - key: DB_PASS
  #       sync: false

  # === REDIS (for rate limiting, caching, BullMQ) ===
