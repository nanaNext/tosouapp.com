name: CI

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Unit tests — MUST pass (no DB needed)
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Run unit tests
        run: npx jest attendance/backend/tests/unit/ --testPathIgnorePatterns='auth.test' --forceExit --maxWorkers=2
      - name: Test summary
        if: always()
        run: echo "Unit tests completed"

  # Security checks
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Security audit
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true
      - name: Check for secrets in code
        run: |
          echo "Checking for hardcoded secrets..."
          if grep -rn "password.*=.*['\"]" attendance/backend/src/ --include="*.js" | grep -v "process.env" | grep -v "test" | grep -v "placeholder" | grep -v "example" | head -5; then
            echo "⚠️ Potential hardcoded secrets found (review above)"
          else
            echo "✅ No obvious hardcoded secrets"
          fi

  # Integration tests (needs MySQL — skip if no DB)
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    continue-on-error: true
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: attendance_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Run integration tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: testpass
          DB_NAME: attendance_test
          JWT_SECRET_CURRENT: ci-test-secret
          NODE_ENV: test
          DISABLE_SCHEDULERS: "true"
          DISABLE_EMBEDDED_WORKER: "true"
        run: npx jest attendance/backend/tests/unit/auth.test.js --testTimeout=60000 --forceExit
        continue-on-error: true

  # Build check — ensure app starts without crash
  build-check:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Verify app loads
        env:
          DISABLE_EMBEDDED_WORKER: "true"
          DISABLE_SCHEDULERS: "true"
          DB_HOST: localhost
          JWT_SECRET_CURRENT: ci-build-check
        run: |
          node -e "
            process.env.DISABLE_EMBEDDED_WORKER='true';
            process.env.DISABLE_SCHEDULERS='true';
            try {
              require('./attendance/backend/src/core/logger');
              require('./attendance/backend/src/core/middleware/passwordPolicy');
              require('./attendance/backend/src/core/middleware/sanitize');
              require('./attendance/backend/src/core/middleware/security');
              require('./attendance/backend/src/core/errorReporter');
              console.log('✅ All core modules load OK');
            } catch(e) {
              console.error('❌ Module load failed:', e.message);
              process.exit(1);
            }
          "
